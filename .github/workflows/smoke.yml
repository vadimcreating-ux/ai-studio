name: Smoke Tests

on:
  push:
    branches: [main, develop, "claude/*"]

  workflow_dispatch:
    inputs:
      branch:
        description: "Ветка для тестирования"
        required: true
        default: main
        type: choice
        options:
          - main
          - develop
          - current

jobs:
  smoke:
    name: Run smoke tests against prod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show tested branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run: branch = ${{ github.event.inputs.branch }}"
          else
            echo "Auto run: push to ${{ github.ref_name }}"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_omit: ""

      - name: Wait for prod to be healthy
        run: |
          echo "Waiting for prod to respond..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vadimcreating-ux-ai-studio-775d.twc1.net/health)
            if [ "$STATUS" = "200" ]; then
              echo "Prod is up!"
              exit 0
            fi
            echo "Attempt $i/24: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Prod did not respond after 4 minutes"
          exit 1

      - name: Run smoke tests
        env:
          TEST_URL: https://vadimcreating-ux-ai-studio-775d.twc1.net
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npm run test:smoke

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_number }}
          path: smoke-report-*.json
