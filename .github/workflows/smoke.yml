name: Smoke Tests

on:
  push:
    branches: [main]

jobs:
  smoke:
    name: Run smoke tests against prod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Wait for prod to be healthy
        run: |
          echo "Waiting for prod to respond..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vadimcreating-ux-ai-studio-775d.twc1.net/health)
            if [ "$STATUS" = "200" ]; then
              echo "Prod is up!"
              exit 0
            fi
            echo "Attempt $i/24: got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Prod did not respond after 4 minutes"
          exit 1

      - name: Run smoke tests
        run: TEST_URL=https://vadimcreating-ux-ai-studio-775d.twc1.net npm run test:smoke

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: smoke-report-*.json
